<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Electricity Anomaly Detection
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static',
        filename='css/style.css') }}">

</head>

<body class="bg-light">

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg">

        <div class="container-fluid">

            <span class="navbar-brand">

                Electricity Anomaly Detection System

            </span>

            <button id="dark-mode-toggle" class="btn btn-light">

                Toggle Dark Mode

            </button>

        </div>

    </nav>
    <!-- MAIN CONTAINER -->

    <div class="container py-5">

        <div class="text-center mb-5">

            <h1 class="dashboard-title">

                Electricity Consumption
                Anomaly Detection System

            </h1>

            <p class="lead">

                ML-powered monitoring and
                anomaly detection dashboard

            </p>

        </div>

        <!-- UPLOAD CARD -->

        <div class="card shadow p-5">

            <form action="/upload" method="POST" enctype="multipart/form-data">

                <div class="mb-3">

                    <label class="form-label">

                        Upload Dataset

                    </label>

                    <input type="file" name="dataset" class="form-control" required>

                </div>

                <button type="submit" class="btn btn-primary">

                    Run Anomaly Detection

                </button>

                <!-- LOADING SPINNER -->

                <div id="loading-spinner" class="text-center mt-4" style="display:none;">

                    <div class="spinner-border text-primary" role="status">
                    </div>

                    <p class="mt-2">

                        Running AI anomaly analysis...

                    </p>

                </div>

            </form>

        </div>

    </div>

    <!-- FOOTER -->

    <div class="footer">

        ML-Powered Electricity Monitoring Dashboard

    </div>

    <!-- JAVASCRIPT -->

    <script src="{{ url_for(
        'static',
        filename='js/script.js'
        ) }}"></script>

</body>

</html>
